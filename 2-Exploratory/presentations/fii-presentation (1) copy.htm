<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIIs Investor Intelligence Platform — Apresentação</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root {
    width: 100%; height: 100%; overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    background: var(--bg); color: var(--text);
    transition: background 0.4s ease, color 0.4s ease;
  }
  :root {
    --bg: #000000;
    --text: #ffffff;
    --text-secondary: rgba(255,255,255,0.65);
    --accent: #00d2ff;
    --accent-dim: rgba(0,210,255,0.12);
    --accent-glow: rgba(0,210,255,0.35);
    --glass: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.10);
    --shadow: rgba(0,0,0,0.55);
    --red: #ff4d4d;
    --green: #2ecc71;
    --gold: #ffd700;
    --silver: #c0c0c0;
    --bronze: #cd7f32;
  }
  .light-mode {
    --bg: #f5f5f7;
    --text: #1d1d1f;
    --text-secondary: rgba(0,0,0,0.55);
    --accent: #0066cc;
    --accent-dim: rgba(0,102,204,0.08);
    --accent-glow: rgba(0,102,204,0.25);
    --glass: rgba(255,255,255,0.65);
    --border: rgba(0,0,0,0.08);
    --shadow: rgba(0,0,0,0.10);
  }
  .presentation {
    position: relative; width: 100%; height: 100%;
  }
  .slide {
    position: absolute; inset: 0; overflow-y: auto;
    opacity: 0; transform: translateY(24px) scale(0.985);
    transition: opacity 0.55s cubic-bezier(0.22,1,0.36,1), transform 0.55s cubic-bezier(0.22,1,0.36,1);
    pointer-events: none; z-index: 0;
    display: flex; flex-direction: column;
    padding: 6vh 8vw;
  }
  .slide.active {
    opacity: 1; transform: translateY(0) scale(1);
    pointer-events: all; z-index: 1;
  }
  .progress-bar {
    position: fixed; top: 0; left: 0; height: 3px; z-index: 50;
    background: linear-gradient(90deg, var(--accent), var(--accent-glow));
    transition: width 0.4s ease; box-shadow: 0 0 12px var(--accent-glow);
  }
  .controls {
    position: fixed; bottom: 24px; right: 24px; z-index: 50;
    display: flex; gap: 8px; align-items: center;
  }
  .controls-left {
    position: fixed; bottom: 24px; left: 24px; z-index: 50;
    display: flex; gap: 8px; align-items: center;
  }
  .btn {
    background: var(--glass); color: var(--text); border: 1px solid var(--border);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    padding: 10px 16px; border-radius: 12px; cursor: pointer; font-size: 13px; font-weight: 500;
    display: flex; align-items: center; gap: 6px; transition: all 0.2s ease;
    box-shadow: 0 4px 16px var(--shadow); user-select: none;
  }
  .btn:hover { background: var(--accent-dim); border-color: var(--accent); transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn svg { width: 16px; height: 16px; fill: currentColor; }
  .slide-counter {
    font-size: 12px; font-weight: 600; color: var(--text-secondary);
    background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--border);
    padding: 8px 14px; border-radius: 10px; letter-spacing: 0.5px;
  }
  .glass-panel {
    background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border); border-radius: 20px;
    box-shadow: 0 8px 40px var(--shadow);
  }
  .layout-cover {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; min-height: 100%; gap: 2vh;
  }
  .layout-standard {
    display: flex; flex-direction: column; gap: 3vh; max-width: 1100px; margin: 0 auto; width: 100%;
  }
  .layout-split {
    display: grid; grid-template-columns: 1fr 1fr; gap: 3vw; align-items: center; width: 100%;
  }
  .layout-grid-2x2 {
    display: grid; grid-template-columns: 1fr 1fr; gap: 2vw; width: 100%;
  }
  .layout-grid-4 {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 2vw; width: 100%;
  }
  .layout-table { width: 100%; overflow-x: auto; }
  h1.slide-title {
    font-size: clamp(2rem, 4.5vw, 3.8rem); font-weight: 700; line-height: 1.1; letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--text) 60%, var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  h2.slide-subtitle {
    font-size: clamp(1rem, 2vw, 1.5rem); font-weight: 400; color: var(--text-secondary); margin-top: 0.5rem;
  }
  h3.section-title {
    font-size: clamp(1.1rem, 2vw, 1.4rem); font-weight: 600; color: var(--accent); margin-bottom: 1vh;
    display: flex; align-items: center; gap: 8px;
  }
  .bullets { list-style: none; display: flex; flex-direction: column; gap: 1.2vh; }
  .bullets li {
    position: relative; padding-left: 1.4rem; font-size: clamp(0.9rem, 1.4vw, 1.15rem);
    line-height: 1.5; color: var(--text-secondary);
  }
  .bullets li::before {
    content: ''; position: absolute; left: 0; top: 0.6em; width: 6px; height: 6px;
    border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent-glow);
  }
  .tag {
    display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600;
    background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent-glow); margin: 2px;
  }
  .tag-red { background: rgba(255,77,77,0.12); color: var(--red); border-color: rgba(255,77,77,0.3); }
  .tag-green { background: rgba(46,204,113,0.12); color: var(--green); border-color: rgba(46,204,113,0.3); }
  .tag-gold { background: rgba(255,215,0,0.12); color: var(--gold); border-color: rgba(255,215,0,0.3); }
  .tag-silver { background: rgba(192,192,192,0.12); color: var(--silver); border-color: rgba(192,192,192,0.3); }
  .tag-bronze { background: rgba(205,127,50,0.12); color: var(--bronze); border-color: rgba(205,127,50,0.3); }
  .card {
    background: var(--glass); backdrop-filter: blur(16px); border: 1px solid var(--border);
    border-radius: 16px; padding: 2vh 2vw; transition: transform 0.2s ease, border-color 0.2s ease;
  }
  .card:hover { transform: translateY(-4px); border-color: var(--accent-glow); }
  .card h4 { font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--text); }
  .card p { font-size: 0.9rem; color: var(--text-secondary); line-height: 1.5; }
  .big-number {
    font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 800; color: var(--accent); line-height: 1;
    text-shadow: 0 0 30px var(--accent-glow);
  }
  .table-elegant {
    width: 100%; border-collapse: separate; border-spacing: 0; font-size: 0.85rem;
    background: var(--glass); backdrop-filter: blur(12px); border-radius: 16px; overflow: hidden;
    border: 1px solid var(--border); box-shadow: 0 8px 32px var(--shadow);
  }
  .table-elegant th, .table-elegant td { padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); }
  .table-elegant th { background: var(--accent-dim); color: var(--accent); font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; }
  .table-elegant tr:last-child td { border-bottom: none; }
  .table-elegant tr:hover td { background: var(--accent-dim); }
  .formula-box {
    background: var(--glass); border: 1px solid var(--border); border-radius: 16px; padding: 2vh 2vw;
    text-align: center; font-family: 'Courier New', monospace; font-size: clamp(0.9rem, 1.5vw, 1.2rem);
    color: var(--accent); backdrop-filter: blur(12px); box-shadow: 0 0 20px var(--accent-glow);
  }
  .modal-overlay {
    position: fixed; inset: 0; z-index: 60; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal-content {
    background: var(--glass); backdrop-filter: blur(24px); border: 1px solid var(--border); border-radius: 20px;
    padding: 32px; max-width: 520px; width: 90%; box-shadow: 0 20px 60px var(--shadow); color: var(--text);
  }
  .modal-content h3 { margin-bottom: 16px; font-size: 1.2rem; }
  .modal-content p, .modal-content li { font-size: 0.95rem; color: var(--text-secondary); line-height: 1.6; }
  .modal-content ul { list-style: none; margin-top: 12px; }
  .modal-content li { padding: 4px 0; }
  .modal-content .kbd {
    display: inline-block; background: var(--accent-dim); border: 1px solid var(--border);
    border-radius: 6px; padding: 2px 8px; font-size: 0.8rem; font-weight: 600; color: var(--accent); margin-right: 4px;
  }
  .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .exit-full { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 40; display: none; }
  .exit-full.active { display: block; }
  @media (max-width: 900px) {
    .layout-split { grid-template-columns: 1fr; }
    .layout-grid-4 { grid-template-columns: repeat(2, 1fr); }
    .slide { padding: 4vh 5vw; }
  }
  @media (max-width: 600px) {
    .layout-grid-2x2 { grid-template-columns: 1fr; }
    .layout-grid-4 { grid-template-columns: 1fr; }
    .controls, .controls-left { bottom: 12px; }
    .controls { right: 12px; }
    .controls-left { left: 12px; }
  }
  .scroll-indicator { position: absolute; bottom: 2vh; left: 50%; transform: translateX(-50%); opacity: 0.4; animation: bounce 2s infinite; }
  @keyframes bounce { 0%, 100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-8px); } }
  .subtle-glow { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15; pointer-events: none; z-index: 0; }
  .logo-mark { font-weight: 800; font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 2vh; }
  .teaser { font-size: clamp(1rem, 1.8vw, 1.35rem); color: var(--text-secondary); max-width: 760px; line-height: 1.6; }
  .author-line { font-size: 0.9rem; color: var(--text-secondary); margin-top: 4vh; }
  .author-line strong { color: var(--text); font-weight: 600; }
  .institution-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2vw; width: 100%; max-width: 900px; }
  .institution-card { background: var(--glass); border: 1px solid var(--border); border-radius: 16px; padding: 2vh 2vw; }
  .institution-card label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); font-weight: 600; display: block; margin-bottom: 0.4rem; }
  .institution-card span { font-size: 1rem; font-weight: 500; color: var(--text); line-height: 1.4; display: block; }
  .negative-context { color: var(--red); }
  .positive-context { color: var(--green); }
  .phase-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 0.75rem; font-weight: 700; padding: 4px 10px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
  .phase-done { background: rgba(46,204,113,0.15); color: var(--green); border: 1px solid rgba(46,204,113,0.3); }
  .phase-todo { background: rgba(255,193,7,0.15); color: #ffc107; border: 1px solid rgba(255,193,7,0.3); }
  .link-url { color: var(--accent); text-decoration: none; font-weight: 500; word-break: break-all; }
  .link-url:hover { text-decoration: underline; }
  .github-card { display: flex; flex-direction: column; align-items: center; gap: 2vh; text-align: center; padding: 4vh 4vw; }
  .github-icon { width: 64px; height: 64px; fill: var(--accent); filter: drop-shadow(0 0 12px var(--accent-glow)); }
  .fade-in { animation: fadeIn 0.8s ease forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .step-flow { display: flex; align-items: center; gap: 1vw; flex-wrap: wrap; justify-content: center; margin-top: 2vh; }
  .step-box { background: var(--glass); border: 1px solid var(--border); border-radius: 12px; padding: 1vh 1.5vw; font-size: 0.85rem; font-weight: 500; }
  .step-arrow { color: var(--accent); font-size: 1.2rem; }

  /* ===== Cover enhancements ===== */
  .cover-header-img { width: 100%; max-width: 900px; height: auto; max-height: 22vh; object-fit: contain; border-radius: 12px; margin-bottom: 1vh; }
  .cover-footer-img { width: 100%; max-width: 900px; height: auto; max-height: 18vh; object-fit: contain; border-radius: 12px; margin-top: 2vh; }
  .cover-divider { width: 100px; height: 2px; background: linear-gradient(90deg, transparent, var(--accent), transparent); border-radius: 2px; margin: 1vh auto; }
  .cover-institutional { font-size: clamp(0.8rem, 1.3vw, 1rem); color: var(--text-secondary); max-width: 900px; line-height: 1.6; font-weight: 500; margin-top: 1vh; padding: 0 2vw; }
  .cover-tagline { font-size: clamp(1.1rem, 2vw, 1.5rem); font-weight: 300; color: var(--accent); letter-spacing: 0.02em; line-height: 1.4; }
  .cover-subtagline { font-size: clamp(0.85rem, 1.4vw, 1.05rem); color: var(--text-secondary); font-style: italic; line-height: 1.5; margin-top: 0.5vh; }
  @media (max-width: 600px) {
    .cover-header-img { max-height: 16vh; }
    .cover-footer-img { max-height: 14vh; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const TOTAL_SLIDES = 28;

/* ==================== Icon components ==================== */
const Icons = {
  Moon: () => <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>,
  Sun: () => <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>,
  Fullscreen: () => <svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>,
  Exit: () => <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>,
  Home: () => <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
  Download: () => <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
  Help: () => <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
  ArrowLeft: () => <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>,
  ArrowRight: () => <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>,
  Github: () => <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.87 1.52 2.34 1.07 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.92 0-1.11.38-2 1.03-2.71-.1-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.79-.22 1.65-.33 2.5-.33.85 0 1.71.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1 2.64.65.71 1.03 1.6 1.03 2.71 0 3.82-2.34 4.66-4.57 4.91.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0 0 12 2z"/></svg>,
  Alert: () => <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
  Check: () => <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>,
  ChevronDown: () => <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>,
};

/* ==================== Reusable components ==================== */
function GlassCard({ children, style }) {
  return <div className="card" style={style}>{children}</div>;
}

function Tag({ text, type }) {
  return <span className={`tag ${type ? 'tag-' + type : ''}`}>{text}</span>;
}

function BigNumber({ n, label }) {
  return (
    <div style={{ textAlign: 'center' }}>
      <div className="big-number">{n}</div>
      <div style={{ fontSize: '0.85rem', color: 'var(--text-secondary)', marginTop: '0.5rem', fontWeight: 500 }}>{label}</div>
    </div>
  );
}

/* ==================== Slides ==================== */

function Slide01() {
  return (
    <div className="layout-cover">
      <div className="subtle-glow" style={{ width: '60vw', height: '60vw', background: 'var(--accent)', top: '-20vw', left: '-10vw' }} />

      {/* Header com imagem */}
      <img
        src="<<url_4>>"
        alt="Investor Intelligence Platform Brazilian FIIs"
        className="cover-header-img"
      />

      <div className="cover-divider" />

      {/* Título principal */}
      <h1 className="slide-title" style={{ fontSize: 'clamp(2rem, 4.5vw, 3.8rem)', marginTop: '1vh' }}>
        Market Intelligence<br />& Behavioral Analytics
      </h1>

      {/* Teaser técnico */}
      <p className="teaser" style={{ maxWidth: '900px', marginTop: '2vh' }}>
        Uma plataforma escalável que combina <span style={{ color: 'var(--accent)', fontWeight: 600 }}>Big Data, PySpark, MapReduce, Word Count, NLP, TF-IDF, BM25, Web Scraping, RAG</span> e análises assistidas por IA para transformar discussões financeiras em larga escala em insights acionáveis para Fundos de Investimento Imobiliário (FIIs).
      </p>

      {/* Tagline */}
      <div style={{ marginTop: '2vh', textAlign: 'center' }}>
        <p className="cover-tagline">
          Onde as discussões de mercado se tornam investimentos
        </p>
        <p className="cover-subtagline">
          Porque os mercados falam muito...<br />Sistemas inteligentes apenas ouvem melhor
        </p>
      </div>

      {/* Texto institucional */}
      <p className="cover-institutional" style={{ marginTop: '2vh' }}>
        <strong>Uma plataforma de inteligência de nível institucional projetada para monitorar, estruturar, ranquear e interpretar sinais relacionados aos Fundos de Investimento Imobiliário (FIIs) brasileiros em mídias financeiras, portais de pesquisa e comunidades de investidores.</strong>
      </p>

      {/* Tags */}
      <div style={{ marginTop: '2vh', display: 'flex', gap: '8px', flexWrap: 'wrap', justifyContent: 'center' }}>
        <Tag text="21 Fontes" />
        <Tag text="Big Data" />
        <Tag text="PySpark" />
        <Tag text="MapReduce" />
        <Tag text="TF-IDF" />
        <Tag text="BM25" />
        <Tag text="RAG" />
        <Tag text="FastAPI" />
      </div>

      {/* Footer com imagem */}
      <img
        src="<<url_5>>"
        alt="Big Data PySpark NLP Web Scraping AI Governance"
        className="cover-footer-img"
      />

      <div className="scroll-indicator"><Icons.ChevronDown /></div>
    </div>
  );
}

function Slide02() {
  return (
    <div className="layout-cover" style={{ gap: '3vh' }}>
      <h2 className="slide-subtitle" style={{ marginBottom: '1vh' }}>Contexto Acadêmico</h2>
      <h1 className="slide-title" style={{ fontSize: 'clamp(1.8rem, 4vw, 3.2rem)' }}>PUC-SP — FACEI</h1>
      <div className="institution-grid">
        <div className="institution-card">
          <label>Instituição</label>
          <span>Pontifical Catholic University of São Paulo (PUC-SP)</span>
        </div>
        <div className="institution-card">
          <label>Faculdade</label>
          <span>FACEI — Faculdade de Ciências Exatas e de Informática</span>
        </div>
        <div className="institution-card">
          <label>Programa</label>
          <span>Humanistic AI & Data Science — 5º Semestre — 2026</span>
        </div>
        <div className="institution-card">
          <label>Disciplina</label>
          <span>AI Security, Cybersecurity & Social Engineering</span>
        </div>
        <div className="institution-card">
          <label>Professor</label>
          <span>Eduardo Savino Gomes</span>
        </div>
        <div className="institution-card">
          <label>Autores</label>
          <span>Fabiana Campanari · Pedro Vyctor Almeida</span>
        </div>
      </div>

const SLIDE_COMPONENTS = [
  Slide01, Slide02, Slide03, Slide04, Slide05, Slide06, Slide07, Slide08,
  Slide09, Slide10, Slide11, Slide12, Slide13, Slide14, Slide15, Slide16,
  Slide17, Slide18, Slide19, Slide20, Slide21, Slide22, Slide23, Slide24,
  Slide25, Slide26, Slide27, Slide28
];

/* ==================== Main App ==================== */
function PresentationApp() {
  const [current, setCurrent] = useState(0);
  const [dark, setDark] = useState(true);
  const [help, setHelp] = useState(false);
  const [exit, setExit] = useState(false);
  const [dlMsg, setDlMsg] = useState(false);
  const containerRef = useRef(null);
  const touchStartX = useRef(null);

  const goNext = useCallback(() => setCurrent(c => Math.min(c + 1, TOTAL_SLIDES - 1)), []);
  const goPrev = useCallback(() => setCurrent(c => Math.max(c - 1, 0)), []);
  const goStart = useCallback(() => setCurrent(0), []);

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ' || e.key === 'Enter') { e.preventDefault(); goNext(); }
      else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp' || e.key === 'Backspace') { e.preventDefault(); goPrev(); }
      else if (e.key === 'Home') { e.preventDefault(); goStart(); }
      else if (e.key === 'Escape') { e.preventDefault(); setExit(true); }
      else if (e.key === 'h' || e.key === 'H') { e.preventDefault(); setHelp(v => !v); }
      else if (e.key === 'f' || e.key === 'F') { e.preventDefault(); toggleFullscreen(); }
      else if (e.key === 'd' || e.key === 'D') { e.preventDefault(); setDark(v => !v); }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [goNext, goPrev, goStart]);

  useEffect(() => {
    if (dark) document.body.classList.remove('light-mode');
    else document.body.classList.add('light-mode');
  }, [dark]);

  const toggleFullscreen = () => {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen().catch(() => {});
    }
  };

  const onTouchStart = (e) => { touchStartX.current = e.changedTouches[0].screenX; };
  const onTouchEnd = (e) => {
    const endX = e.changedTouches[0].screenX;
    if (touchStartX.current == null) return;
    const diff = touchStartX.current - endX;
    if (Math.abs(diff) > 50) { diff > 0 ? goNext() : goPrev(); }
    touchStartX.current = null;
  };

  const downloadPPT = () => {
    setDlMsg(true);
    setTimeout(() => setDlMsg(false), 3000);
  };

  const CurrentSlide = SLIDE_COMPONENTS[current];

  return (
    <div
      className={`presentation ${dark ? '' : 'light-mode'}`}
      ref={containerRef}
      onTouchStart={onTouchStart}
      onTouchEnd={onTouchEnd}
    >
      <div className="progress-bar" style={{ width: `${((current + 1) / TOTAL_SLIDES) * 100}%` }} />

      <div className="controls-left">
        <span className="slide-counter">{current + 1} / {TOTAL_SLIDES}</span>
      </div>

      <div className="controls">
        <button className="btn" onClick={() => setDark(v => !v)} title="Toggle Dark/Light">
          {dark ? <Icons.Sun /> : <Icons.Moon />}
          <span>{dark ? 'Light' : 'Dark'}</span>
        </button>
        <button className="btn" onClick={toggleFullscreen} title="Fullscreen">
          <Icons.Fullscreen />
        </button>
        <button className="btn" onClick={goStart} title="Return to Start">
          <Icons.Home />
        </button>
        <button className="btn" onClick={downloadPPT} title="Download PPT">
          <Icons.Download />
        </button>
        <button className="btn" onClick={() => setHelp(true)} title="Help">
          <Icons.Help />
        </button>
        <button className="btn" onClick={() => setExit(true)} title="Exit">
          <Icons.Exit />
        </button>
        <button className="btn" onClick={goPrev} title="Previous">
          <Icons.ArrowLeft />
        </button>
        <button className="btn" onClick={goNext} title="Next">
          <Icons.ArrowRight />
        </button>
      </div>

      {SLIDE_COMPONENTS.map((Comp, i) => (
        <div key={i} className={`slide ${i === current ? 'active' : ''}`}>
          <Comp />
        </div>
      ))}

      {/* Help Modal */}
      <div className={`modal-overlay ${help ? 'open' : ''}`} onClick={() => setHelp(false)}>
        <div className="modal-content" onClick={e => e.stopPropagation()}>
          <h3>Keyboard Shortcuts</h3>
          <ul>
            <li><span className="kbd">→</span> <span className="kbd">↓</span> <span className="kbd">Space</span> <span className="kbd">Enter</span> — Next slide</li>
            <li><span className="kbd">←</span> <span className="kbd">↑</span> <span className="kbd">Backspace</span> — Previous slide</li>
            <li><span className="kbd">Home</span> — Return to start</li>
            <li><span className="kbd">Esc</span> — Exit presentation</li>
            <li><span className="kbd">F</span> — Fullscreen toggle</li>
            <li><span className="kbd">D</span> — Dark/Light mode</li>
            <li><span className="kbd">H</span> — Toggle this help</li>
          </ul>
          <div className="modal-buttons">
            <button className="btn" onClick={() => setHelp(false)}>Close</button>
          </div>
        </div>
      </div>

      {/* Exit Modal */}
      <div className={`modal-overlay ${exit ? 'open' : ''}`} onClick={() => setExit(false)}>
        <div className="modal-content" onClick={e => e.stopPropagation()}>
          <h3>Exit Presentation?</h3>
          <p>Are you sure you want to leave the presentation?</p>
          <div className="modal-buttons">
            <button className="btn" onClick={() => setExit(false)}>Stay</button>
            <button className="btn" onClick={() => window.close()} style={{ color: 'var(--red)', borderColor: 'var(--red)' }}>Exit</button>
          </div>
        </div>
      </div>

      {/* Download PPT toast */}
      <div className={`modal-overlay ${dlMsg ? 'open' : ''}`} onClick={() => setDlMsg(false)}>
        <div className="modal-content" onClick={e => e.stopPropagation()} style={{ textAlign: 'center' }}>
          <h3>Download PowerPoint</h3>
          <p>This React presentation is exportable as HTML.<br/>For a PPT version, export the structure document provided alongside this presentation.</p>
          <div className="modal-buttons" style={{ justifyContent: 'center' }}>
            <button className="btn" onClick={() => setDlMsg(false)}>Got it</button>
          </div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<PresentationApp />);
</script>
